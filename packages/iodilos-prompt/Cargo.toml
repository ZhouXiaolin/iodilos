[package]
name = "iodilos-prompt"
version = "0.1.0"
edition = "2024"
license = "MIT"
publish = false
description = "A statusline + framed multiline prompt component for iodilos TUI"

[lib]
name = "iodilos_prompt"
path = "src/lib.rs"

[dependencies]
iodilos = { path = "../iodilos" }
crossterm = "0.29"
unicode-width = "0.2"
# Drives the cursor blink timer.
futures-timer = "3.0"
