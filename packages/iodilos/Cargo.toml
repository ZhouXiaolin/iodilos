[package]
name = "iodilos"
categories = ["command-line-interface", "gui"]
description = "A standalone reactive terminal UI library (derived from sycamore-tui)"
keywords = ["tui", "terminal", "reactive", "crossterm", "taffy"]
edition = "2024"
license = "MIT"
readme = "README.md"
repository = "https://github.com/solaren/iodilos"
version = "0.1.0"

[lib]
name = "iodilos"

[dependencies]
bitflags = "2.6"
crossterm = { version = "0.29", features = ["event-stream"] }
futures = "0.3.30"
paste = "1.0.15"
slotmap = "1.0.6"
smallvec = { version = "1.13.2", features = ["union", "const_generics"] }
iodilos-macros = { path = "../iodilos-macros", version = "0.1.0" }
taffy = "0.11"
unicode-width = "0.2"

